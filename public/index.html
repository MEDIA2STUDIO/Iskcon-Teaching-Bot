<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>கீதை AI — பகவத் கீதை ஞான சாட்பாட்</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕉</text></svg>">
</head>
<body>

<div id="dataLoading" class="data-loading">
  <div class="spinner"></div>
  <p>பகவத் கீதை தரவுகள் ஏற்றப்படுகின்றன...</p>
</div>

<div id="appMain" class="app" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">பகவத்<br>கீதை</div>
    <div class="sidebar-sub">ஞான சாட்பாட்</div>
    <div class="sidebar-verse-count">700 வசனங்கள்</div>

    <div class="sidebar-bottom">
      <div class="sidebar-source">பிரபுபாதர்</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    
    <!-- Header -->
    <div class="chat-header">
      <div class="header-left">
        <span class="status-dot"></span>
        <span class="status-text"><span>கீதை AI</span> • உங்கள் கேள்விக்கு பதில் சொல்ல தயார்</span>
      </div>
      <div class="header-right">
        <div class="header-translate">
          <button class="btn-header-translate" id="translateBtn" title="மொழிபெயர்ப்பு">
            <span id="translateIcon">🌐</span>
            <span id="translateLabel">மொழிபெயர்ப்பு</span>
          </button>
          <div id="langPanel" class="lang-panel" style="display:none;">
            <select id="langSelect" class="lang-select">
              <option value="">— மொழி தேர்வு —</option>
              <option value="ta">தமிழ்</option>
              <option value="en">English</option>
              <option value="hi">हिन्दी</option>
              <option value="bn">বাংলা</option>
              <option value="gu">ગુજરાતી</option>
              <option value="kn">ಕನ್ನಡ</option>
              <option value="ml">മലയാളം</option>
              <option value="mr">मराठी</option>
              <option value="or">ଓଡ଼ିଆ</option>
              <option value="pa">ਪੰਜਾਬੀ</option>
              <option value="te">తెలుగు</option>
              <option value="ur">اردو</option>
              <option value="ar">العربية</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="ja">日本語</option>
              <option value="zh-CN">中文</option>
              <option value="ru">Русский</option>
              <option value="pt">Português</option>
              <option value="id">Bahasa</option>
              <option value="th">ไทย</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div id="google_translate_element" style="display:none;"></div>

    <!-- Messages -->
    <div class="messages-area" id="messages"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-inner">
        <input type="text" id="chatInput" placeholder="உங்கள் கேள்வியை இங்கே எழுதுங்கள்..." autocomplete="off">
        <button class="btn-mic" id="micBtn" title="குரல் மூலம் கேளுங்கள்">🎤</button>
        <button class="btn-send" id="sendBtn" title="அனுப்பு">➤</button>
      </div>
      <div class="info-banner">AI தவறு செய்ய வாய்ப்புள்ளது. ஆழமான புரிதலுக்கு குருவை அணுகவும்.</div>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
