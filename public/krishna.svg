<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFF8E1"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E5F8A"/>
      <stop offset="100%" stop-color="#2C4A6E"/>
    </linearGradient>
    <linearGradient id="crown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="dhoti" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="200" cy="250" r="180" fill="#FFF9C4" opacity="0.4"/>
  <circle cx="200" cy="250" r="140" fill="#FFECB3" opacity="0.3"/>

  <!-- Body -->
  <ellipse cx="200" cy="280" rx="55" ry="80" fill="url(#skin)"/>

  <!-- Dhoti -->
  <path d="M160 340 Q200 370 240 340 L250 420 Q200 440 150 420 Z" fill="url(#dhoti)"/>
  <path d="M170 345 Q200 370 230 345" stroke="#E6A800" stroke-width="2" fill="none"/>

  <!-- Left leg -->
  <ellipse cx="175" cy="420" rx="18" ry="30" fill="url(#skin)" transform="rotate(-10,175,420)"/>

  <!-- Right leg (crossed) -->
  <ellipse cx="225" cy="420" rx="18" ry="30" fill="url(#skin)" transform="rotate(10,225,420)"/>

  <!-- Neck -->
  <rect x="185" y="210" width="30" height="20" rx="5" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="200" cy="185" rx="40" ry="45" fill="url(#skin)"/>

  <!-- Hair (back) -->
  <path d="M160 180 Q160 130 200 120 Q240 130 240 180" fill="#1A1A2E"/>

  <!-- Face details -->
  <!-- Eyes -->
  <ellipse cx="185" cy="180" rx="6" ry="4" fill="#1A1A2E"/>
  <ellipse cx="215" cy="180" rx="6" ry="4" fill="#1A1A2E"/>
  <circle cx="186" cy="179" r="1.5" fill="#fff"/>
  <circle cx="216" cy="179" r="1.5" fill="#fff"/>

  <!-- Eyebrows -->
  <path d="M178 173 Q185 170 192 173" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>
  <path d="M208 173 Q215 170 222 173" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>

  <!-- Nose -->
  <path d="M197 185 Q200 190 203 185" stroke="#2C4A6E" stroke-width="1.5" fill="none"/>

  <!-- Smile -->
  <path d="M190 195 Q200 202 210 195" stroke="#C62828" stroke-width="1.5" fill="none"/>

  <!-- Tilak on forehead -->
  <path d="M197 168 L200 163 L203 168 L200 165 Z" fill="#FF6B35"/>

  <!-- Crown / Peacock feather -->
  <path d="M165 155 Q170 130 185 120 Q180 135 175 145 Z" fill="#2196F3"/>
  <path d="M175 145 Q185 110 200 115 Q190 130 185 140 Z" fill="#2196F3"/>
  <path d="M210 155 Q215 130 220 120 Q225 135 220 145 Z" fill="#2196F3"/>

  <!-- Crown base -->
  <path d="M165 155 Q200 140 235 155" stroke="url(#crown)" stroke-width="4" fill="none"/>

  <!-- Crown top -->
  <path d="M170 152 L175 125 L185 148 L192 118 L200 145 L208 118 L215 148 L225 125 L230 152" 
        stroke="url(#crown)" stroke-width="2.5" fill="url(#crown)" opacity="0.9"/>

  <!-- Earrings -->
  <circle cx="160" cy="190" r="5" fill="url(#crown)"/>
  <circle cx="240" cy="190" r="5" fill="url(#crown)"/>

  <!-- Necklace -->
  <path d="M175 215 Q200 230 225 215" stroke="#FFD700" stroke-width="2" fill="none"/>
  <circle cx="190" cy="218" r="2" fill="#FFD700"/>
  <circle cx="200" cy="222" r="2.5" fill="#FFD700"/>
  <circle cx="210" cy="218" r="2" fill="#FFD700"/>

  <!-- Garlands -->
  <path d="M170 230 Q200 250 230 230" stroke="#E53935" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M165 245 Q200 265 235 245" stroke="#4CAF50" stroke-width="3" fill="none" opacity="0.7"/>

  <!-- Left arm -->
  <path d="M155 245 Q130 270 140 310 Q145 325 155 320" stroke="url(#skin)" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Right arm (playing flute) -->
  <path d="M245 245 Q260 255 265 280 Q268 295 260 305" stroke="url(#skin)" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Flute -->
  <rect x="145" y="290" width="120" height="10" rx="4" fill="#8D6E63" transform="rotate(-15,205,295)"/>
  <rect x="145" y="290" width="120" height="10" rx="4" fill="#6D4C41" opacity="0.3" transform="rotate(-15,205,295)"/>
  <!-- Flute end -->
  <rect x="250" y="287" width="8" height="12" rx="2" fill="#5D4037" transform="rotate(-15,254,293)"/>
  <!-- Flute holes -->
  <circle cx="185" cy="297" r="2" fill="#3E2723" transform="rotate(-15,185,297)"/>
  <circle cx="200" cy="298" r="2" fill="#3E2723" transform="rotate(-15,200,298)"/>
  <circle cx="215" cy="299" r="2" fill="#3E2723" transform="rotate(-15,215,299)"/>
  <circle cx="230" cy="300" r="2" fill="#3E2723" transform="rotate(-15,230,300)"/>

  <!-- Left hand fingers on flute -->
  <circle cx="250" cy="293" r="5" fill="url(#skin)"/>

  <!-- Right hand holding flute middle -->
  <circle cx="180" cy="300" r="5" fill="url(#skin)"/>

  <!-- Peacock feather detail -->
  <path d="M195 118 Q200 105 205 118" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
  <circle cx="200" cy="110" r="3" fill="#FFEB3B"/>
  <circle cx="200" cy="110" r="1.5" fill="#FF6F00"/>

  <!-- Aura / halo -->
  <circle cx="200" cy="185" r="55" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.4"/>
  <circle cx="200" cy="185" r="60" fill="none" stroke="#FFD700" stroke-width="0.8" opacity="0.2"/>

  <!-- Ground -->
  <ellipse cx="200" cy="455" rx="120" ry="10" fill="#A5D6A7" opacity="0.5"/>
  <path d="M80 455 Q200 440 320 455" stroke="#81C784" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
